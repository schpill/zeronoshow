server {
    listen 80;
    listen [::]:80;
    server_name zeronoshow.fr www.zeronoshow.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zeronoshow.fr www.zeronoshow.fr;

    ssl_certificate /etc/letsencrypt/live/zeronoshow.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zeronoshow.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https:; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

    root /var/www/html/backend/public/build;
    index index.html index.php;
    client_max_body_size 20m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    location /build/ {
        alias /var/www/html/backend/public/build/assets/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        try_files $uri /index.php?$query_string;
    }

    location /sanctum/ {
        try_files $uri /index.php?$query_string;
    }

    location /storage/ {
        alias /var/www/html/backend/storage/app/public/;
        access_log off;
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/backend/public;
        fastcgi_pass api:9000;
        fastcgi_read_timeout 300;
    }
}
