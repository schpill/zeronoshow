name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/znz-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/docker/php/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract frontend metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/znz-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Generate frontend image Dockerfile
        run: |
          cat > frontend/Dockerfile.ci <<'EOF'
          FROM node:20-alpine AS build
          WORKDIR /app
          COPY frontend/package.json frontend/pnpm-lock.yaml ./
          RUN corepack enable && corepack prepare pnpm@10 --activate && pnpm install --frozen-lockfile
          COPY frontend/ .
          RUN pnpm build
          FROM nginx:1.27-alpine
          COPY --from=build /app/dist /usr/share/nginx/html
          EOF

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-api
      - build-frontend
    steps:
      - uses: actions/checkout@v5

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          API_IMAGE_TAG: sha-${{ github.sha }}
          FRONTEND_IMAGE_TAG: sha-${{ github.sha }}
          GHCR_OWNER: ${{ github.repository_owner }}
          APP_DOMAIN: zeronoshow.fr
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: API_IMAGE_TAG,FRONTEND_IMAGE_TAG,GHCR_OWNER,APP_DOMAIN,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd "${{ secrets.PROD_APP_PATH }}"
            export API_IMAGE_TAG
            export FRONTEND_IMAGE_TAG
            export GHCR_OWNER
            export APP_DOMAIN
            export GHCR_TOKEN
            export GITHUB_SHA="${{ github.sha }}"
            export GITHUB_REF_NAME="${{ github.ref_name }}"
            ./scripts/forge-deploy.sh deploy

      - name: Verify public health endpoint
        run: curl -fsS https://zeronoshow.fr/api/v1/health
