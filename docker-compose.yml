services:
  api:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    container_name: znz_api
    working_dir: /var/www/html
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - znz_net

  worker:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    container_name: znz_worker
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --sleep=1 --max-time=3600
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - znz_net

  scheduler:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    container_name: znz_scheduler
    working_dir: /var/www/html
    command: php artisan schedule:work
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - znz_net

  nginx:
    image: nginx:1.27-alpine
    container_name: znz_nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - znz_net

  db:
    image: postgres:16-alpine
    container_name: znz_db
    environment:
      POSTGRES_DB: zeronoshow
      POSTGRES_USER: zeronoshow
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeronoshow -d zeronoshow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - znz_net

  redis:
    image: redis:7-alpine
    container_name: znz_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - znz_net

  mailpit:
    image: axllent/mailpit:latest
    container_name: znz_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - znz_net

networks:
  znz_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
