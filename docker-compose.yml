services:
  api:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    container_name: znz_api
    working_dir: /var/www/html
    environment: &backend_env
      APP_NAME: ${APP_NAME:-ZeroNoShow}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-base64:7Sukl99c9M7xAsKeVZTzjQ9zDihqgKjDh+9inI6F3LA=}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost}
      APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
      APP_LOCALE: ${APP_LOCALE:-fr}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-fr}
      APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-fr_FR}
      APP_MAINTENANCE_DRIVER: ${APP_MAINTENANCE_DRIVER:-file}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_STACK: ${LOG_STACK:-single}
      LOG_DEPRECATIONS_CHANNEL: ${LOG_DEPRECATIONS_CHANNEL:-null}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-zeronoshow}
      DB_USERNAME: ${DB_USERNAME:-zeronoshow}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_ENCRYPT: ${SESSION_ENCRYPT:-false}
      SESSION_PATH: ${SESSION_PATH:-/}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-null}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-log}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      CACHE_STORE: ${CACHE_STORE:-redis}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_SCHEME: ${MAIL_SCHEME:-null}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-null}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-null}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@zeronoshow.test}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ZeroNoShow}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
      TWILIO_WEBHOOK_SECRET: ${TWILIO_WEBHOOK_SECRET:-}
      STRIPE_KEY: ${STRIPE_KEY:-}
      STRIPE_SECRET: ${STRIPE_SECRET:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-west-3}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
      VITE_APP_NAME: ${VITE_APP_NAME:-ZeroNoShow}
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - znz_net

  worker:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    container_name: znz_worker
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --sleep=1 --max-time=3600
    environment: *backend_env
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - znz_net

  scheduler:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    container_name: znz_scheduler
    working_dir: /var/www/html
    command: php artisan schedule:work
    environment: *backend_env
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - znz_net

  nginx:
    image: nginx:1.27-alpine
    container_name: znz_nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - znz_net

  db:
    image: postgres:16-alpine
    container_name: znz_db
    environment:
      POSTGRES_DB: zeronoshow
      POSTGRES_USER: zeronoshow
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeronoshow -d zeronoshow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - znz_net

  redis:
    image: redis:7-alpine
    container_name: znz_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - znz_net

  mailpit:
    image: axllent/mailpit:latest
    container_name: znz_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - znz_net

networks:
  znz_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
