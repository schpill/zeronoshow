services:
  frontend:
    build:
      context: ./backend
      dockerfile: docker/node/Dockerfile
    container_name: znz_frontend_build
    volumes:
      - ./frontend:/app
    networks:
      - znz_net

  nginx:
    image: nginx:1.27-alpine
    container_name: znz_nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html/backend:ro
      - ./backend/docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - znz_net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  api:
    image: ghcr.io/${GHCR_OWNER}/znz-api:${API_IMAGE_TAG:-latest}
    container_name: znz_api
    restart: unless-stopped
    working_dir: /var/www/html
    environment: &backend_env
      APP_NAME: ${APP_NAME:-ZeroNoShow}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Paris}
      APP_LOCALE: ${APP_LOCALE:-fr}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-fr}
      APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-fr_FR}
      APP_KEY: ${APP_KEY}
      APP_MAINTENANCE_DRIVER: ${APP_MAINTENANCE_DRIVER:-file}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_STACK: ${LOG_STACK:-single}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      CACHE_STORE: ${CACHE_STORE:-redis}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_ENCRYPT: ${SESSION_ENCRYPT:-false}
      SESSION_PATH: ${SESSION_PATH:-/}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_SCHEME: ${MAIL_SCHEME:-tls}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ZeroNoShow}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM: ${TWILIO_FROM}
      TWILIO_WEBHOOK_SECRET: ${TWILIO_WEBHOOK_SECRET:-}
      STRIPE_KEY: ${STRIPE_KEY}
      STRIPE_SECRET: ${STRIPE_SECRET}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
      VITE_APP_ENV: production
    volumes:
      - ./backend:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/api/v1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - znz_net
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 1024M

  queue-worker:
    image: ghcr.io/${GHCR_OWNER}/znz-api:${API_IMAGE_TAG:-latest}
    container_name: znz_queue_worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --sleep=1 --max-time=3600
    environment: *backend_env
    volumes:
      - ./backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - znz_net
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  scheduler:
    image: ghcr.io/${GHCR_OWNER}/znz-api:${API_IMAGE_TAG:-latest}
    container_name: znz_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    environment: *backend_env
    volumes:
      - ./backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - znz_net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M

  postgres:
    image: postgres:16-alpine
    container_name: znz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - znz_net
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M

  redis:
    image: redis:7-alpine
    container_name: znz_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - znz_net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

networks:
  znz_net:
    driver: bridge

volumes:
  certbot_www:
  letsencrypt:
  postgres_data:
  redis_data:
